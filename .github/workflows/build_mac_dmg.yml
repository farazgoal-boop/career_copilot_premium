name: Build Mac DMG

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build macOS app bundle
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "Career Copilot Premium" \
            --add-data "desktop_app:desktop_app" \
            --add-data "web_app:web_app" \
            --add-data "mobile_app:mobile_app" \
            --add-data "data:data" \
            --add-data "runtime_paths.py:." \
            --add-data "app_licensing.py:." \
            --add-data ".env.example:." \
            --add-data "docs/USER_MANUAL.html:docs" \
            --hidden-import flask \
            --hidden-import werkzeug \
            --hidden-import PySide6 \
            --hidden-import speech_recognition \
            --hidden-import sounddevice \
            premium_launcher.py

      - name: Create DMG
        run: |
          VERSION="1.0.0"
          STAGING="dist/dmg-staging"
          DMG="dist/CareerCopilotPremium-v${VERSION}-macOS.dmg"
          rm -rf "$STAGING" "$DMG"
          mkdir -p "$STAGING"
          cp -R "dist/Career Copilot Premium.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Career Copilot Premium" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG"
          ls -lh "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CareerCopilotPremium-macOS-dmg
          path: dist/CareerCopilotPremium-v1.0.0-macOS.dmg
          if-no-files-found: error

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CareerCopilotPremium-v1.0.0-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
