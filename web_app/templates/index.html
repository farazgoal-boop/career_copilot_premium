{% extends "base.html" %}

{% block title %}Career Copilot Premium{% endblock %}

{% block header %}{% endblock %}

{% block body_class %}home-view{% endblock %}

{% block content %}
<div class="home-shell">

  <div class="home-topbar">
    <span class="home-brand">Career Copilot Premium</span>
    <a href="/onboarding" class="home-gear" aria-label="Settings" title="Profile &amp; settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </div>

  <section class="home-hero">
    <button id="home-start-btn" class="home-start-btn" type="button">Start session</button>
    <p id="home-status" class="home-status" role="status" aria-live="polite"></p>
  </section>

  <section class="home-sessions">
    <p class="home-sessions-label">Recent</p>
    <div id="home-sessions-list" class="home-sessions-list" aria-label="Recent sessions">
      <p class="home-sessions-loading" aria-live="polite">Loading&hellip;</p>
    </div>
  </section>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function () {
  'use strict';

  var startBtn = document.getElementById('home-start-btn');
  var statusEl = document.getElementById('home-status');
  var sessionsList = document.getElementById('home-sessions-list');

  function setStatus(msg, isError) {
    statusEl.textContent = msg || '';
    statusEl.className = 'home-status' + (isError ? ' home-status--error' : '');
  }

  function relativeTime(iso) {
    if (!iso) return '';
    try {
      var diff = Date.now() - new Date(iso).getTime();
      var m = Math.floor(diff / 60000);
      if (m < 2) return 'just now';
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    } catch (e) { return ''; }
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderSessions(sessions) {
    if (!sessions || sessions.length === 0) {
      sessionsList.innerHTML = '<p class="home-sessions-empty">No sessions yet. Start your first session above.</p>';
      return;
    }
    sessionsList.innerHTML = '';
    sessions.slice(0, 3).forEach(function (s) {
      var a = document.createElement('a');
      a.href = '/session/' + encodeURIComponent(s.session_id) + '/live';
      a.className = 'home-session-item';
      var name = escapeHtml((s.profile_name || '') + (s.company_name ? ' · ' + s.company_name : ''));
      var time = escapeHtml(relativeTime(s.updated_at));
      a.innerHTML =
        '<span class="home-session-main">' +
          '<span class="home-session-name">' + name + '</span>' +
          (time ? '<span class="home-session-time">' + time + '</span>' : '') +
        '</span>' +
        '<span class="home-session-chevron" aria-hidden="true">›</span>';
      sessionsList.appendChild(a);
    });
  }

  async function loadRecent() {
    try {
      var resp = await fetch('/api/sessions/recent', { headers: { 'Accept': 'application/json' } });
      var data = await resp.json();
      renderSessions(data.sessions || []);
    } catch (e) {
      sessionsList.innerHTML = '<p class="home-sessions-empty">Could not load recent sessions.</p>';
    }
  }

  startBtn.addEventListener('click', async function () {
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    setStatus('');
    try {
      var resp = await fetch('/api/session/quick-start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ use_microphone: true }),
      });
      var data = await resp.json();
      if (resp.ok && data.ok && data.session_id) {
        window.location.href = '/session/' + encodeURIComponent(data.session_id) + '/live';
        return;
      }
      if (resp.status === 400 || resp.status === 403) {
        window.location.href = '/onboarding';
        return;
      }
      throw new Error(data.error || 'Could not start session.');
    } catch (e) {
      startBtn.disabled = false;
      startBtn.textContent = 'Start session';
      setStatus(e.message || String(e), true);
    }
  });

  loadRecent();
})();
</script>
{% endblock %}
