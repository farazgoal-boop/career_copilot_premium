<aside class="sidebar" id="sidebar" aria-label="Main navigation">

  <!-- Header: always visible in both collapsed and expanded states -->
  <div class="sidebar-header">
    <img src="/static/icon.png" class="sidebar-logo-icon" alt="Career Copilot" />
    <span class="sidebar-logo-text">Career Copilot</span>
    <button class="sidebar-pin" id="sidebar-pin" aria-label="Pin sidebar open" title="Pin sidebar open">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <line x1="12" y1="17" x2="12" y2="22"/>
        <path d="M5 17h14v-1.5L17 12V7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v5L5 15.5V17z"/>
        <line x1="9" y1="6" x2="15" y2="6"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <nav class="sidebar-nav">

    <a href="/dashboard" class="sidebar-item" data-path="/dashboard" aria-label="Home">
      <span class="sidebar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="sidebar-label">Home</span>
    </a>

    <a href="/sessions" class="sidebar-item" data-path="/sessions" aria-label="Sessions">
      <span class="sidebar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </span>
      <span class="sidebar-label">Sessions</span>
    </a>

    <a href="/profile" class="sidebar-item" data-path="/profile" aria-label="Profile">
      <span class="sidebar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span class="sidebar-label">Profile</span>
    </a>

    <a href="/system-status" class="sidebar-item" data-path="/system-status" aria-label="System Status">
      <span class="sidebar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      <span class="sidebar-label">System Status</span>
    </a>

    <a href="/settings" class="sidebar-item" data-path="/settings" aria-label="Settings">
      <span class="sidebar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

      </span>

  </nav>
</aside>
<script>
(function () {
  var sidebar = document.getElementById('sidebar');
  var pinBtn = document.getElementById('sidebar-pin');
  if (!sidebar || !pinBtn) return;

  /* expand/collapse: mouse only — no keyboard listeners */
  sidebar.addEventListener('mouseenter', function () {
    sidebar.classList.add('is-open');
  });
  sidebar.addEventListener('mouseleave', function () {
    /* only collapse if not pinned */
    if (!sidebar.classList.contains('is-pinned')) {
      sidebar.classList.remove('is-open');
    }
  });

  /* pin toggle — locks sidebar open until unpinned */
  pinBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var nowPinned = sidebar.classList.toggle('is-pinned');
    pinBtn.classList.toggle('is-pinned', nowPinned);
    pinBtn.setAttribute('aria-label', nowPinned ? 'Unpin sidebar' : 'Pin sidebar open');
    pinBtn.setAttribute('title', nowPinned ? 'Unpin sidebar' : 'Pin sidebar open');
    if (nowPinned) {
      sidebar.classList.add('is-open');
    }
    /* when unpinning: mouse is still inside sidebar (user just clicked),
       so mouseleave will handle collapse naturally when they move away */
  });

  /* active state */
  var path = window.location.pathname.replace(/\/+$/, '') || '/dashboard';
  sidebar.querySelectorAll('.sidebar-item[data-path]').forEach(function (item) {
    if (item.dataset.path === path) item.classList.add('is-active');
  });
})();
</script>
