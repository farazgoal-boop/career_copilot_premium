<script>
(function () {
  var sidebar = document.getElementById('sidebar');
  if (!sidebar) return;

  /* expand/collapse: mouse only — no keyboard listeners */
  sidebar.addEventListener('mouseenter', function () { sidebar.classList.add('is-open'); });
  sidebar.addEventListener('mouseleave', function () { sidebar.classList.remove('is-open'); });

  /* active state */
  var path = window.location.pathname.replace(/\/+$/, '') || '/dashboard';
  sidebar.querySelectorAll('.sidebar-item[data-path]').forEach(function (item) {
    if (item.dataset.path === path) item.classList.add('is-active');
  });
})();
</script>
